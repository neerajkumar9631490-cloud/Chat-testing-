<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DARKNET // ANON CHAT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg:        #0a0a0a;
    --bg2:       #0f0f0f;
    --bg3:       #141414;
    --surface:   #111111;
    --border:    #1a1a1a;
    --green:     #00ff41;
    --green-dim: #00cc33;
    --green-glow:#00ff4133;
    --blue:      #00d4ff;
    --blue-dim:  #00aacc;
    --blue-glow: #00d4ff22;
    --blue-glow2:#00d4ff44;
    --red:       #ff2244;
    --red-glow:  #ff224422;
    --yellow:    #ffcc00;
    --muted:     #444;
    --text:      #cccccc;
    --font-mono: 'Share Tech Mono', monospace;
    --font-head: 'Orbitron', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    overflow: hidden;
  }

  /* ── SCANLINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,65,0.015) 2px,
      rgba(0,255,65,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
    animation: scanlines 8s linear infinite;
  }

  @keyframes scanlines {
    0%   { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }

  /* ── NOISE OVERLAY ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9998; opacity: .4;
  }

  /* ═══════════════════════════
     JOIN SCREEN
  ═══════════════════════════ */
  #join-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2rem;
    background: var(--bg);
    z-index: 100;
    transition: opacity .6s ease, transform .6s ease;
  }

  #join-screen.hidden {
    opacity: 0;
    transform: scale(1.04);
    pointer-events: none;
  }

  .join-logo {
    text-align: center;
  }

  .join-logo h1 {
    font-family: var(--font-head);
    font-size: clamp(1.6rem, 5vw, 3rem);
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 20px var(--green), 0 0 40px var(--green-dim);
    letter-spacing: .15em;
    animation: flicker 4s infinite;
  }

  .join-logo .subtitle {
    font-size: .75rem;
    color: var(--muted);
    letter-spacing: .3em;
    margin-top: .4rem;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96%          { opacity: .4; }
    97%          { opacity: 1; }
    98%          { opacity: .2; }
    99%          { opacity: 1; }
  }

  .join-box {
    display: flex; flex-direction: column; gap: 1rem;
    width: min(360px, 90vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
    box-shadow: 0 0 40px rgba(0,255,65,.05), inset 0 1px 0 rgba(255,255,255,.03);
    position: relative;
  }

  .join-box::before {
    content: '> IDENTIFY YOURSELF';
    position: absolute; top: -10px; left: 16px;
    font-size: .65rem; letter-spacing: .2em;
    color: var(--green);
    background: var(--bg);
    padding: 0 8px;
  }

  .join-label {
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .15em;
  }

  .join-input {
    background: var(--bg);
    border: 1px solid #222;
    border-radius: 2px;
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 1rem;
    padding: .75rem 1rem;
    outline: none;
    transition: border-color .3s, box-shadow .3s;
    caret-color: var(--green);
  }

  .join-input:focus {
    border-color: var(--green-dim);
    box-shadow: 0 0 0 2px var(--green-glow), inset 0 0 12px rgba(0,255,65,.04);
  }

  .join-input::placeholder { color: #333; }

  .join-btn {
    background: transparent;
    border: 1px solid var(--green-dim);
    border-radius: 2px;
    color: var(--green);
    font-family: var(--font-head);
    font-size: .8rem;
    letter-spacing: .2em;
    padding: .75rem;
    cursor: pointer;
    transition: background .3s, box-shadow .3s;
  }

  .join-btn:hover {
    background: rgba(0,255,65,.08);
    box-shadow: 0 0 16px var(--green-glow);
  }

  .join-btn:active { transform: scale(.98); }

  .join-error {
    font-size: .75rem;
    color: var(--red);
    text-align: center;
    min-height: 1em;
    letter-spacing: .05em;
  }

  /* ═══════════════════════════
     CHANNEL SELECT MODAL
  ═══════════════════════════ */
  #channel-modal {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.85);
    backdrop-filter: blur(6px);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s ease;
  }

  #channel-modal.visible {
    opacity: 1;
    pointer-events: all;
  }

  .channel-panel {
    width: min(480px, 92vw);
    background: var(--surface);
    border: 1px solid #222;
    border-radius: 4px;
    padding: 2.5rem 2rem;
    box-shadow:
      0 0 80px rgba(0,255,65,.08),
      0 0 140px rgba(0,255,65,.03),
      inset 0 1px 0 rgba(255,255,255,.04);
    position: relative;
    transform: scale(.92) translateY(16px);
    transition: transform .4s cubic-bezier(.16,1,.3,1);
  }

  #channel-modal.visible .channel-panel {
    transform: scale(1) translateY(0);
  }

  .channel-panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-dim), transparent);
    opacity: .6;
  }

  .channel-title {
    font-family: var(--font-head);
    font-size: clamp(.85rem, 2.5vw, 1.1rem);
    color: var(--green);
    letter-spacing: .3em;
    text-align: center;
    margin-bottom: .5rem;
    text-shadow: 0 0 12px var(--green-dim);
  }

  .channel-subtitle {
    font-size: .65rem;
    color: #333;
    letter-spacing: .2em;
    text-align: center;
    margin-bottom: 2rem;
  }

  .channel-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #222, transparent);
    margin-bottom: 2rem;
  }

  /* The 3 big channel buttons */
  .channel-btns {
    display: flex; flex-direction: column; gap: 1rem;
  }

  .ch-btn {
    position: relative;
    display: flex; align-items: center; gap: 1rem;
    padding: 1.1rem 1.4rem;
    background: var(--bg);
    border: 1px solid #1e1e1e;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color .25s, box-shadow .25s, background .25s;
    overflow: hidden;
    text-align: left;
    width: 100%;
  }

  .ch-btn::after {
    content: '';
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity .25s;
  }

  .ch-btn:hover { transform: none; }

  /* CREATE PRIVATE — green tint */
  .ch-btn.create {
    border-color: #1a2e1a;
  }
  .ch-btn.create::after {
    background: linear-gradient(135deg, rgba(0,255,65,.04) 0%, transparent 60%);
  }
  .ch-btn.create:hover {
    border-color: var(--green-dim);
    box-shadow: 0 0 24px rgba(0,255,65,.12), inset 0 0 20px rgba(0,255,65,.03);
    background: #0a150a;
  }
  .ch-btn.create:hover::after { opacity: 1; }

  /* JOIN PRIVATE — blue tint */
  .ch-btn.join-priv {
    border-color: #0d1e2a;
  }
  .ch-btn.join-priv::after {
    background: linear-gradient(135deg, rgba(0,212,255,.04) 0%, transparent 60%);
  }
  .ch-btn.join-priv:hover {
    border-color: var(--blue-dim);
    box-shadow: 0 0 24px rgba(0,212,255,.12), inset 0 0 20px rgba(0,212,255,.03);
    background: #070f14;
  }
  .ch-btn.join-priv:hover::after { opacity: 1; }

  /* GLOBAL — yellow/amber tint */
  .ch-btn.global {
    border-color: #2a2000;
  }
  .ch-btn.global::after {
    background: linear-gradient(135deg, rgba(255,204,0,.04) 0%, transparent 60%);
  }
  .ch-btn.global:hover {
    border-color: #aa8800;
    box-shadow: 0 0 24px rgba(255,204,0,.1), inset 0 0 20px rgba(255,204,0,.03);
    background: #0f0b00;
  }
  .ch-btn.global:hover::after { opacity: 1; }

  .ch-btn:active { transform: scale(.98); }

  .ch-icon {
    font-size: 1.4rem;
    flex-shrink: 0;
    width: 2rem;
    text-align: center;
    filter: drop-shadow(0 0 4px currentColor);
  }

  .ch-btn.create  .ch-icon { color: var(--green); }
  .ch-btn.join-priv .ch-icon { color: var(--blue); }
  .ch-btn.global  .ch-icon { color: var(--yellow); }

  .ch-info { flex: 1; }

  .ch-label {
    font-family: var(--font-head);
    font-size: .75rem;
    letter-spacing: .2em;
    margin-bottom: .25rem;
  }

  .ch-btn.create   .ch-label { color: var(--green); }
  .ch-btn.join-priv .ch-label { color: var(--blue); }
  .ch-btn.global   .ch-label { color: var(--yellow); }

  .ch-desc {
    font-size: .65rem;
    color: var(--muted);
    letter-spacing: .08em;
    line-height: 1.4;
  }

  .ch-arrow {
    font-size: .8rem;
    color: #2a2a2a;
    flex-shrink: 0;
    transition: color .25s, transform .25s;
  }

  .ch-btn.create:hover   .ch-arrow { color: var(--green-dim); transform: translateX(3px); }
  .ch-btn.join-priv:hover .ch-arrow { color: var(--blue-dim); transform: translateX(3px); }
  .ch-btn.global:hover   .ch-arrow { color: #aa8800; transform: translateX(3px); }

  /* ── JOIN PRIVATE: CODE INPUT PANEL ── */
  .join-code-panel {
    display: none;
    flex-direction: column;
    gap: 1rem;
    animation: fadeSlideUp .3s ease;
  }

  .join-code-panel.active {
    display: flex;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .code-header {
    display: flex; align-items: center; gap: .75rem;
    margin-bottom: .5rem;
  }

  .code-back-btn {
    background: transparent;
    border: 1px solid #222;
    border-radius: 2px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: .7rem;
    letter-spacing: .1em;
    padding: .3rem .7rem;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    flex-shrink: 0;
  }

  .code-back-btn:hover {
    border-color: #444;
    color: var(--text);
  }

  .code-title {
    font-family: var(--font-head);
    font-size: .75rem;
    letter-spacing: .2em;
    color: var(--blue);
    text-shadow: 0 0 8px var(--blue-dim);
  }

  .code-input-wrap {
    position: relative;
  }

  .code-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid #1e2a30;
    border-radius: 2px;
    color: var(--blue);
    font-family: var(--font-mono);
    font-size: 1.2rem;
    letter-spacing: .3em;
    padding: .85rem 1rem;
    outline: none;
    text-transform: uppercase;
    text-align: center;
    transition: border-color .3s, box-shadow .3s;
    caret-color: var(--blue);
  }

  .code-input:focus {
    border-color: var(--blue-dim);
    box-shadow: 0 0 0 2px var(--blue-glow2), inset 0 0 12px rgba(0,212,255,.04);
  }

  .code-input::placeholder {
    color: #1a2a30;
    letter-spacing: .2em;
    font-size: .9rem;
  }

  .code-join-btn {
    background: transparent;
    border: 1px solid var(--blue-dim);
    border-radius: 2px;
    color: var(--blue);
    font-family: var(--font-head);
    font-size: .8rem;
    letter-spacing: .2em;
    padding: .75rem;
    cursor: pointer;
    transition: background .3s, box-shadow .3s;
    width: 100%;
  }

  .code-join-btn:hover {
    background: rgba(0,212,255,.08);
    box-shadow: 0 0 16px var(--blue-glow2);
  }

  .code-join-btn:active { transform: scale(.98); }

  .code-error {
    font-size: .75rem;
    color: var(--red);
    text-align: center;
    min-height: 1em;
    letter-spacing: .05em;
    animation: errorShake .3s ease;
  }

  @keyframes errorShake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    40%     { transform: translateX(6px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }

  /* ═══════════════════════════
     CHAT SCREEN
  ═══════════════════════════ */
  #chat-screen {
    display: flex; flex-direction: column;
    height: 100vh;
    opacity: 0;
    transition: opacity .6s ease .1s;
  }

  #chat-screen.visible { opacity: 1; }

  /* ── HEADER ── */
  .chat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .7rem 1.2rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: .5rem;
  }

  .header-left {
    display: flex; align-items: center; gap: .75rem;
    min-width: 0;
  }

  .header-title {
    font-family: var(--font-head);
    font-size: .8rem;
    color: var(--green);
    letter-spacing: .2em;
    text-shadow: 0 0 8px var(--green-dim);
    white-space: nowrap;
  }

  /* Room badge in header */
  .room-badge {
    display: none;
    align-items: center; gap: .5rem;
    background: rgba(0,212,255,.06);
    border: 1px solid rgba(0,212,255,.2);
    border-radius: 2px;
    padding: .2rem .6rem;
    flex-shrink: 0;
    animation: badgePop .4s cubic-bezier(.16,1,.3,1);
  }

  .room-badge.visible { display: flex; }

  @keyframes badgePop {
    from { opacity: 0; transform: scale(.8); }
    to   { opacity: 1; transform: scale(1); }
  }

  .room-badge-label {
    font-size: .55rem;
    color: #336655;
    letter-spacing: .15em;
  }

  .room-badge-code {
    font-family: var(--font-head);
    font-size: .72rem;
    color: var(--blue);
    letter-spacing: .25em;
    text-shadow: 0 0 8px var(--blue-dim);
  }

  .room-copy-btn {
    background: transparent;
    border: none;
    color: #334455;
    font-size: .7rem;
    cursor: pointer;
    padding: 0 .2rem;
    transition: color .2s;
    font-family: var(--font-mono);
    line-height: 1;
  }

  .room-copy-btn:hover { color: var(--blue); }
  .room-copy-btn.copied { color: var(--green); }

  .header-status {
    display: flex; align-items: center; gap: .5rem;
    font-size: .7rem; color: var(--muted);
    letter-spacing: .1em;
    flex-shrink: 0;
  }

  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: .3; }
  }

  .online-count { color: var(--green); font-weight: bold; }

  /* ── BODY: SIDEBAR + MESSAGES ── */
  .chat-body {
    display: flex; flex: 1; overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 180px; flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  @media (max-width: 600px) {
    .sidebar { display: none; }
  }

  .sidebar-title {
    padding: .7rem 1rem;
    font-size: .65rem; letter-spacing: .2em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .user-list {
    flex: 1; overflow-y: auto; padding: .5rem 0;
  }

  .user-list::-webkit-scrollbar { width: 3px; }
  .user-list::-webkit-scrollbar-track { background: transparent; }
  .user-list::-webkit-scrollbar-thumb { background: #222; }

  .user-item {
    display: flex; align-items: center; gap: .5rem;
    padding: .35rem 1rem;
    font-size: .75rem; color: #888;
    transition: color .2s;
  }

  .user-item.self { color: var(--green); }

  .user-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
  }

  /* ── MESSAGES ── */
  .messages-wrap {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 1rem;
    display: flex; flex-direction: column; gap: .5rem;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }

  /* ── MESSAGE BUBBLES ── */
  .msg {
    display: flex; flex-direction: column;
    max-width: 80%;
    animation: msg-in .25s ease;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.self { align-self: flex-end; align-items: flex-end; }
  .msg.other { align-self: flex-start; }

  .msg-meta {
    display: flex; align-items: baseline; gap: .5rem;
    margin-bottom: .2rem;
  }

  .msg-user {
    font-size: .7rem; font-weight: bold;
    letter-spacing: .08em;
  }

  .msg.self   .msg-user { color: var(--blue); }
  .msg.other  .msg-user { color: var(--green); }

  .msg-time {
    font-size: .6rem; color: #333;
  }

  .msg-bubble {
    padding: .55rem .85rem;
    border-radius: 2px;
    font-size: .88rem;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
  }

  .msg.self .msg-bubble {
    background: #0a1a2a;
    border: 1px solid #0d2840;
    color: #a0d8ef;
    box-shadow: 0 0 12px rgba(0,212,255,.06);
  }

  .msg.other .msg-bubble {
    background: #0a150a;
    border: 1px solid #0d2010;
    color: #b8e6b8;
    box-shadow: 0 0 12px rgba(0,255,65,.04);
  }

  /* ── SYSTEM MESSAGES ── */
  .msg-system {
    align-self: center;
    font-size: .68rem;
    color: #444;
    letter-spacing: .1em;
    padding: .3rem .8rem;
    border: 1px solid #1a1a1a;
    border-radius: 2px;
    animation: msg-in .25s ease;
  }

  .msg-system.join  { color: #336633; border-color: #1a2e1a; }
  .msg-system.leave { color: #663333; border-color: #2e1a1a; }

  /* ── TYPING INDICATOR ── */
  #typing-bar {
    height: 22px; padding: 0 1rem;
    font-size: .68rem; color: #444;
    letter-spacing: .08em;
    flex-shrink: 0;
    display: flex; align-items: center; gap: .4rem;
    transition: opacity .3s;
  }

  #typing-bar.hidden { opacity: 0; }

  .typing-dots span {
    display: inline-block; width: 4px; height: 4px;
    background: var(--green-dim); border-radius: 50%;
    animation: dot-bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }

  @keyframes dot-bounce {
    0%,80%,100% { transform: translateY(0); }
    40%          { transform: translateY(-4px); }
  }

  /* ── INPUT AREA ── */
  .input-area {
    display: flex; gap: .6rem; align-items: center;
    padding: .75rem 1rem;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .prompt-symbol {
    color: var(--green); font-size: 1rem; flex-shrink: 0;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0; }
  }

  #msg-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid #1e1e1e;
    border-radius: 2px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: .9rem;
    padding: .6rem .9rem;
    outline: none;
    transition: border-color .3s, box-shadow .3s;
    caret-color: var(--green);
  }

  #msg-input:focus {
    border-color: #2a2a2a;
    box-shadow: 0 0 0 1px var(--green-glow);
  }

  #msg-input::placeholder { color: #2a2a2a; }

  #send-btn {
    background: transparent;
    border: 1px solid var(--green-dim);
    border-radius: 2px;
    color: var(--green);
    font-family: var(--font-head);
    font-size: .7rem;
    letter-spacing: .15em;
    padding: .6rem 1.1rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .2s, box-shadow .2s;
  }

  #send-btn:hover {
    background: rgba(0,255,65,.1);
    box-shadow: 0 0 12px var(--green-glow);
  }

  #send-btn:active { transform: scale(.96); }

  /* ── Toast notification ── */
  .toast {
    position: fixed;
    bottom: 5rem; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--surface);
    border: 1px solid #222;
    border-radius: 2px;
    padding: .5rem 1.2rem;
    font-size: .7rem;
    color: var(--green);
    letter-spacing: .1em;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
    z-index: 5000;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- ═══════ JOIN SCREEN ═══════ -->
<div id="join-screen">
  <div class="join-logo">
    <h1>DARKNET //</h1>
    <div class="subtitle">ANONYMOUS RELAY CHAT &bull; ENCRYPTED CHANNEL</div>
  </div>
  <div class="join-box">
    <div class="join-label">ENTER ALIAS</div>
    <input
      id="username-input"
      class="join-input"
      type="text"
      placeholder="anonymous_user"
      maxlength="20"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="join-btn" id="join-btn">CONNECT &rarr;</button>
    <div class="join-error" id="join-error"></div>
  </div>
</div>

<!-- ═══════ CHANNEL SELECT MODAL ═══════ -->
<div id="channel-modal">
  <div class="channel-panel">

    <!-- MAIN: three channel buttons -->
    <div id="channel-select-view">
      <div class="channel-title">SELECT CHANNEL</div>
      <div class="channel-subtitle">CHOOSE YOUR TRANSMISSION MODE</div>
      <div class="channel-divider"></div>
      <div class="channel-btns">

        <button class="ch-btn create" id="btn-create-room">
          <span class="ch-icon">&#9632;</span>
          <span class="ch-info">
            <div class="ch-label">CREATE PRIVATE ROOM</div>
            <div class="ch-desc">Generate encrypted room &mdash; share code with allies</div>
          </span>
          <span class="ch-arrow">&#8250;</span>
        </button>

        <button class="ch-btn join-priv" id="btn-join-room">
          <span class="ch-icon">&#9670;</span>
          <span class="ch-info">
            <div class="ch-label">JOIN PRIVATE ROOM</div>
            <div class="ch-desc">Enter room code to access secure channel</div>
          </span>
          <span class="ch-arrow">&#8250;</span>
        </button>

        <button class="ch-btn global" id="btn-global-chat">
          <span class="ch-icon">&#9670;</span>
          <span class="ch-info">
            <div class="ch-label">GLOBAL CHAT</div>
            <div class="ch-desc">Open relay &mdash; all connected nodes</div>
          </span>
          <span class="ch-arrow">&#8250;</span>
        </button>

      </div>
    </div>

    <!-- JOIN CODE: enter room code -->
    <div class="join-code-panel" id="join-code-view">
      <div class="code-header">
        <button class="code-back-btn" id="code-back-btn">&larr; BACK</button>
        <div class="code-title">ENTER ROOM CODE</div>
      </div>
      <input
        class="code-input"
        id="room-code-input"
        type="text"
        placeholder="X X X X X X"
        maxlength="8"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="code-join-btn" id="code-join-btn">JOIN CHANNEL &rarr;</button>
      <div class="join-error" id="code-error"></div>
    </div>

  </div>
</div>

<!-- ═══════ CHAT SCREEN ═══════ -->
<div id="chat-screen">

  <div class="chat-header">
    <div class="header-left">
      <div class="header-title">// DARKNET CHAT</div>
      <!-- Room badge (shown only in private rooms) -->
      <div class="room-badge" id="room-badge">
        <span class="room-badge-label">ROOM</span>
        <span class="room-badge-code" id="room-badge-code">------</span>
        <button class="room-copy-btn" id="room-copy-btn" title="Copy room code">&#9647;</button>
      </div>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      <span>ONLINE:&nbsp;<span class="online-count" id="online-count">0</span></span>
    </div>
  </div>

  <div class="chat-body">

    <div class="sidebar">
      <div class="sidebar-title" id="sidebar-title">CONNECTED NODES</div>
      <div class="user-list" id="user-list"></div>
    </div>

    <div class="messages-wrap">
      <div id="messages"></div>

      <div id="typing-bar" class="hidden">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
        <span id="typing-text"></span>
      </div>

      <div class="input-area">
        <span class="prompt-symbol">&gt;</span>
        <input
          id="msg-input"
          type="text"
          placeholder="transmit message..."
          maxlength="500"
          autocomplete="off"
          spellcheck="false"
          disabled
        />
        <button id="send-btn" disabled>SEND</button>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ──
  let myUsername     = null;
  let typingTimer    = null;
  let isTyping       = false;
  let currentRoom    = null;  // null = global, string = room code
  let pendingAction  = null;  // 'create' | 'join' | 'global'

  // ── Socket connection (UPDATED FOR RENDER.COM) ──
  // connects to same origin where page is served (Render backend)
  const socket = io({ transports: ["websocket"] });

  // ── DOM refs ──
  const joinScreen      = document.getElementById('join-screen');
  const chatScreen      = document.getElementById('chat-screen');
  const usernameInput   = document.getElementById('username-input');
  const joinBtn         = document.getElementById('join-btn');
  const joinError       = document.getElementById('join-error');
  const messages        = document.getElementById('messages');
  const msgInput        = document.getElementById('msg-input');
  const sendBtn         = document.getElementById('send-btn');
  const onlineCount     = document.getElementById('online-count');
  const userList        = document.getElementById('user-list');
  const typingBar       = document.getElementById('typing-bar');
  const typingText      = document.getElementById('typing-text');
  const channelModal    = document.getElementById('channel-modal');
  const channelSelectView = document.getElementById('channel-select-view');
  const joinCodeView    = document.getElementById('join-code-view');
  const roomCodeInput   = document.getElementById('room-code-input');
  const codeJoinBtn     = document.getElementById('code-join-btn');
  const codeBackBtn     = document.getElementById('code-back-btn');
  const codeError       = document.getElementById('code-error');
  const roomBadge       = document.getElementById('room-badge');
  const roomBadgeCode   = document.getElementById('room-badge-code');
  const roomCopyBtn     = document.getElementById('room-copy-btn');
  const sidebarTitle    = document.getElementById('sidebar-title');
  const toastEl         = document.getElementById('toast');

  // ── Helpers ──
  function formatTime(ms) {
    const d = new Date(ms);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function scrollBottom() {
    messages.scrollTo({ top: messages.scrollHeight, behavior: 'smooth' });
  }

  function appendMessage(el) {
    messages.appendChild(el);
    scrollBottom();
  }

  function showToast(msg, duration = 2000) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), duration);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── JOIN SCREEN FLOW ──
  function attemptJoin() {
    const name = usernameInput.value.trim();
    if (!name) { showJoinError('Enter an alias to connect.'); return; }
    if (name.length > 20) { showJoinError('Alias too long (max 20 chars).'); return; }
    joinError.textContent = '';
    joinBtn.textContent = 'CONNECTING...';
    joinBtn.disabled = true;
    socket.emit('join', { username: name });
  }

  function showJoinError(msg) {
    joinError.textContent = '// ERROR: ' + msg;
    joinBtn.textContent = 'CONNECT →';
    joinBtn.disabled = false;
    usernameInput.focus();
  }

  joinBtn.addEventListener('click', attemptJoin);
  usernameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') attemptJoin();
  });

  // ── CHANNEL MODAL ──
  function openChannelModal() {
    showChannelSelectView();
    channelModal.classList.add('visible');
  }

  function closeChannelModal() {
    channelModal.classList.remove('visible');
  }

  function showChannelSelectView() {
    channelSelectView.style.display = 'block';
    joinCodeView.classList.remove('active');
  }

  function showJoinCodeView() {
    channelSelectView.style.display = 'none';
    joinCodeView.classList.add('active');
    codeError.textContent = '';
    roomCodeInput.value = '';
    setTimeout(() => roomCodeInput.focus(), 80);
  }

  // ── Channel button actions ──
  document.getElementById('btn-create-room').addEventListener('click', () => {
    pendingAction = 'create';
    closeChannelModal();
    socket.emit('create_room');
  });

  document.getElementById('btn-join-room').addEventListener('click', () => {
    showJoinCodeView();
  });

  document.getElementById('btn-global-chat').addEventListener('click', () => {
    pendingAction = 'global';
    closeChannelModal();
    socket.emit('join_global');
  });

  codeBackBtn.addEventListener('click', showChannelSelectView);

  function attemptJoinRoom() {
    const code = roomCodeInput.value.trim().toUpperCase();
    if (!code) { showCodeError('Enter a room code.'); return; }
    codeJoinBtn.textContent = 'CONNECTING...';
    codeJoinBtn.disabled = true;
    socket.emit('join_room', { room: code });
  }

  codeJoinBtn.addEventListener('click', attemptJoinRoom);
  roomCodeInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') attemptJoinRoom();
  });

  function showCodeError(msg) {
    codeError.textContent = '// ERROR: ' + msg;
    // Re-trigger animation
    codeError.style.animation = 'none';
    codeError.offsetHeight; // reflow
    codeError.style.animation = '';
    codeJoinBtn.textContent = 'JOIN CHANNEL →';
    codeJoinBtn.disabled = false;
  }

  // ── Enter chat (global or room) ──
  function enterChat(roomCode) {
    currentRoom = roomCode;
    joinScreen.classList.add('hidden');

    // Update header badge
    if (roomCode&& roomCode !== 'global') {
      roomBadgeCode.textContent = roomCode;
      roomBadge.classList.add('visible');
      sidebarTitle.textContent = 'ROOM NODES';
    } else {
      roomBadge.classList.remove('visible');
      sidebarTitle.textContent = 'CONNECTED NODES';
    }

    chatScreen.classList.add('visible');
    msgInput.disabled = false;
    sendBtn.disabled = false;
    msgInput.focus();
  }

  // ── Room copy button ──
  roomCopyBtn.addEventListener('click', () => {
    const code = roomBadgeCode.textContent;
    navigator.clipboard.writeText(code).then(() => {
      roomCopyBtn.classList.add('copied');
      roomCopyBtn.textContent = '✓';
      showToast('// ROOM CODE COPIED: ' + code);
      setTimeout(() => {
        roomCopyBtn.classList.remove('copied');
        roomCopyBtn.textContent = '▏';
      }, 2000);
    }).catch(() => showToast('// COPY FAILED'));
  });

  // ── Socket events ──
  socket.on('join_success', ({ username }) => {
    myUsername = username;
    // Instead of going straight to chat, show channel selection
    openChannelModal();
    joinBtn.textContent = 'CONNECT →';
    joinBtn.disabled = false;
  });

  socket.on('join_error', ({ message }) => {
    showJoinError(message);
  });

  // Server creates room and returns a code
  socket.on('room_created', ({ room_code }) => {
    closeChannelModal();
    enterChat(room_code);
    // Notify
    const el = document.createElement('div');
    el.className = 'msg-system join';
    el.textContent = `// PRIVATE ROOM CREATED: ${room_code}`;
    appendMessage(el);
  });

  // Server confirms room joined
  socket.on('room_joined', ({ room_code }) => {
    closeChannelModal();
    codeJoinBtn.textContent = 'JOIN CHANNEL →';
    codeJoinBtn.disabled = false;
    enterChat(room_code);
    const el = document.createElement('div');
    el.className = 'msg-system join';
    el.textContent = `// JOINED PRIVATE ROOM: ${room_code}`;
    appendMessage(el);
  });

  // Server rejects room join
  socket.on('room_error', ({ message }) => {
    codeJoinBtn.textContent = 'JOIN CHANNEL →';
    codeJoinBtn.disabled = false;
    showCodeError(message || 'Invalid room code.');
    // Re-open join code view if panel closed
    if (!joinCodeView.classList.contains('active')) {
      channelModal.classList.add('visible');
      showJoinCodeView();
    }
  });

  socket.on('system_message', ({ text, type, timestamp }) => {
    const el = document.createElement('div');
    el.className = `msg-system ${type || ''}`;
    el.textContent = `// ${text}`;
    appendMessage(el);
  });

  socket.on('message', ({ username, text, timestamp, sid }) => {
    const isSelf = username === myUsername;
    const wrapper = document.createElement('div');
    wrapper.className = `msg ${isSelf ? 'self' : 'other'}`;
    wrapper.innerHTML = `
      <div class="msg-meta">
        <span class="msg-user">${escHtml(username)}</span>
        <span class="msg-time">${formatTime(timestamp)}</span>
      </div>
      <div class="msg-bubble">${escHtml(text)}</div>
    `;
    appendMessage(wrapper);
  });

  socket.on('user_list', ({ users, count }) => {
    onlineCount.textContent = count;
    userList.innerHTML = users.map(u => `
      <div class="user-item ${u === myUsername ? 'self' : ''}">
        <div class="user-dot"></div>
        <span>${escHtml(u)}${u === myUsername ? ' (you)' : ''}</span>
      </div>
    `).join('');
  });

  socket.on('typing_update', ({ users }) => {
    if (!users.length) {
      typingBar.classList.add('hidden');
    } else {
      typingBar.classList.remove('hidden');
      typingText.textContent = users.length === 1
        ? `${users[0]} is typing...`
        : `${users.slice(0,-1).join(', ')} and ${users.at(-1)} are typing...`;
    }
  });

  // ── Send message ──
  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;
    socket.emit('message', { text });
    msgInput.value = '';
    stopTyping();
  }

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Typing indicator ──
  msgInput.addEventListener('input', () => {
    if (!isTyping) {
      isTyping = true;
      socket.emit('typing', { typing: true });
    }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(stopTyping, 2000);
  });

  function stopTyping() {
    if (isTyping) {
      isTyping = false;
      socket.emit('typing', { typing: false });
    }
    clearTimeout(typingTimer);
  }

  // ── Auto-focus ──
  window.addEventListener('load', () => usernameInput.focus());
</script>
</body>
</html>
